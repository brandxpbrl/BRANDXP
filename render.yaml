services:
  - type: web
    name: brand-experience-os-api
    runtime: python
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      cp -rn /opt/render/project/src/BRAND_EXPERIENCE /opt/render/project/src/BRAND_EXPERIENCE_git_seed || true
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: AI_TEMPERATURE
        value: "0.55"
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ENTITY_VOICE_PROVIDER
        value: mock
      - key: BEOS_ACCESS_CONTROL
        value: "true"
      - key: BEOS_ACCESS_SECRET
        sync: false
      - key: BEOS_DEVELOPER_KEY
        sync: false
      - key: BEOS_CLIENT_KEYS
        sync: false
    disk:
      name: brand-experience-data
      mountPath: /opt/render/project/src/BRAND_EXPERIENCE
      sizeGB: 1

  - type: web
    name: brand-experience-os
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
